<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="업무일지">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F6F3EC">
<title>업무일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Pretendard-Regular:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{
    --paper: #FFFFFF;
    --paper-raised: #FFFFFF;
    --ink: #2B2A26;
    --ink-soft: #6E6A5E;
    --rule: #DBD5C4;
    --rule-strong: #C7BFA8;
    --seal: #B3341F;
    --seal-soft: #F1DDD6;
    --amber: #A9761F;
    --amber-soft: #F3E7D0;
    --slate: #5B6470;
    --slate-soft: #E4E7EA;
    --shadow: 0 1px 2px rgba(43,42,38,.06), 0 6px 20px rgba(43,42,38,.05);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0;}
  body{
    background: var(--paper);
    background-image:
      linear-gradient(var(--paper) 0%, var(--paper) 100%);
    color: var(--ink);
    font-family: 'Pretendard-Regular','Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }
  .serif{ font-family:'Noto Serif KR', serif; }

  /* ===== Header ===== */
  header.app-header{
    position: sticky; top:0; z-index: 40;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 14px 18px 12px;
  }
  .header-row{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand-mark{
    width:30px; height:30px; border-radius:50%;
    border:1.6px solid var(--seal); color:var(--seal);
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif KR',serif; font-weight:900; font-size:13px;
    transform: rotate(-8deg);
    flex:none;
  }
  .brand h1{ font-family:'Noto Serif KR',serif; font-weight:900; font-size:19px; margin:0; letter-spacing:-.2px;}
  .sync-dot{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft); }
  .sync-dot i{ width:6px; height:6px; border-radius:50%; background:#8FA876; display:inline-block; }
  .sync-dot.off i{ background:#C7BFA8; }
  .header-sub{ margin-top:2px; font-size:12px; color:var(--ink-soft); }

  /* ===== Layout ===== */
  main{ max-width: 640px; margin: 0 auto; padding: 14px 14px 0; }

  /* ===== Quick add card ===== */
  .add-card{
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 14px 14px 12px;
    margin-bottom: 16px;
  }
  .date-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .checkin-bar{
    display:flex; align-items:center; gap:10px; justify-content:space-between;
    background:var(--amber-soft); border:1px solid var(--amber); color:var(--amber);
    border-radius:10px; padding:10px 12px; margin-bottom:12px; font-size:12px; line-height:1.4;
  }
  .checkin-bar button{
    flex:none; background:var(--amber); color:#fff; border:none; border-radius:8px;
    padding:8px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; white-space:nowrap;
  }
  .date-nav button.arrow{
    width:30px;height:30px;border-radius:50%; border:1px solid var(--rule-strong);
    background:transparent; color:var(--ink); font-size:15px; display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .date-nav button.arrow:active{ background: var(--rule); }
  .date-label{ text-align:center; }
  .date-label .d{ font-family:'Noto Serif KR',serif; font-weight:700; font-size:16px; }
  .date-label .w{ font-size:11px; color:var(--ink-soft); margin-left:4px; }
  .date-label input[type=date]{
    display:block; margin:2px auto 0; font-size:11px; color:var(--ink-soft);
    border:none; background:transparent; font-family:inherit; padding:0;
  }
  .today-pill{
    font-size:11px; border:1px solid var(--seal); color:var(--seal); background:var(--seal-soft);
    border-radius:999px; padding:3px 9px; cursor:pointer; white-space:nowrap;
  }

  label.field-label{ font-size:11.5px; color:var(--ink-soft); display:block; margin:0 0 5px 2px; }

  .chip-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .chip{
    font-size:12.5px; padding:6px 11px; border-radius:999px;
    border:1px solid var(--rule-strong); background:var(--paper); color:var(--ink);
    cursor:pointer; white-space:nowrap;
  }
  .chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  input[type=text], textarea, input[type=date]{
    width:100%; font-family:inherit; font-size:14.5px; color:var(--ink);
    border:1px solid var(--rule-strong); border-radius:10px; background:var(--paper);
    padding:9px 11px; outline:none;
  }
  input[type=text]:focus, textarea:focus{ border-color: var(--seal); background:#fff; }
  textarea{ min-height:58px; resize:vertical; line-height:1.45; }
  .field{ margin-bottom:10px; }

  .status-row{ display:flex; gap:6px; margin-bottom:12px; }
  .status-chip{
    flex:1; text-align:center; font-size:12.5px; padding:7px 4px; border-radius:9px;
    border:1px solid var(--rule-strong); background:var(--paper); color:var(--ink-soft); cursor:pointer;
  }
  .status-chip.sel-done{ background:var(--seal); border-color:var(--seal); color:#fff; }
  .status-chip.sel-progress{ background:var(--amber); border-color:var(--amber); color:#fff; }
  .status-chip.sel-wait{ background:var(--slate); border-color:var(--slate); color:#fff; }

  .add-btn{
    width:100%; padding:11px; border:none; border-radius:10px;
    background:var(--ink); color:#fff; font-size:14.5px; font-weight:600; letter-spacing:.2px;
    cursor:pointer; font-family:inherit;
  }
  .add-btn:active{ opacity:.85; }

  /* ===== Toolbar ===== */
  .toolbar{ display:flex; align-items:center; justify-content:space-between; margin: 4px 2px 10px; }
  .toolbar .count{ font-size:12px; color:var(--ink-soft); }
  .report-btn{
    display:flex; align-items:center; gap:5px; font-size:12.5px; color:var(--seal);
    background:var(--seal-soft); border:1px solid var(--seal); border-radius:8px; padding:6px 11px; cursor:pointer;
  }

  /* ===== Ledger list ===== */
  .day-group{ margin-bottom: 20px; }
  .day-head{
    display:flex; align-items:baseline; gap:8px; padding: 2px 4px 8px;
    border-bottom: 1px solid var(--rule-strong);
    margin-bottom: 8px;
  }
  .day-head .num{ font-family:'Noto Serif KR',serif; font-weight:900; font-size:20px; }
  .day-head .wd{ font-size:12px; color:var(--ink-soft); }
  .day-head .ym{ margin-left:auto; font-size:11px; color:var(--ink-soft); }

  .entry{
    display:flex; align-items:stretch; border-bottom: 1px dashed var(--rule);
    cursor:pointer;
  }
  .entry:last-child{ border-bottom:none; }
  .entry:active{ background: rgba(219,213,196,.25); }
  .entry.dragging{ opacity:.4; }
  .drag-handle{
    flex:none; width:20px; display:flex; align-items:center; justify-content:center;
    color:var(--rule-strong); font-size:13px; cursor:grab; user-select:none;
  }
  .drag-handle:active{ cursor:grabbing; }
  .entry .cat{
    flex:none; width:72px; font-size:11.5px; font-weight:600; color:var(--ink-soft);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-right:1.5px solid var(--rule-strong);
    padding:9px 8px; display:flex; align-items:center;
  }
  .entry .content-line{
    flex:1; min-width:0; font-size:13.5px; line-height:1.5; color:var(--ink);
    white-space:pre-wrap; word-break:break-word; overflow-wrap:anywhere;
    border-right:1.5px solid var(--rule-strong);
    padding:9px 10px; display:flex; align-items:center;
  }
  .entry .note-col{
    flex:none; width:68px; padding:9px 6px; display:flex; align-items:center; justify-content:center;
  }
  .entry .note-tag{
    font-size:10.5px; padding:3px 9px; border-radius:999px; border:1px solid var(--rule-strong);
    font-weight:600; max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    color:var(--ink-soft); background:var(--paper); text-align:center;
  }
  .note-tag.done{ background:var(--seal-soft); color:var(--seal); border-color:var(--seal); }
  .note-tag.progress{ background:var(--amber-soft); color:var(--amber); border-color:var(--amber); }
  .note-tag.wait{ background:var(--slate-soft); color:var(--slate); border-color:var(--slate); }

  .empty-state{
    text-align:center; padding: 40px 20px; color: var(--ink-soft);
  }
  .empty-state .mark{ font-family:'Noto Serif KR',serif; font-size:26px; color:var(--rule-strong); margin-bottom:8px; }
  .empty-state p{ font-size:13px; margin:2px 0; }

  /* ===== Month select / Search / Filter bar ===== */
  .month-select-wrap{ position:relative; margin-bottom:10px; }
  .month-select-btn{
    font-family:'Noto Serif KR',serif; font-weight:700; font-size:16px; background:none; border:none;
    color:var(--ink); cursor:pointer; padding:2px 0; font-family:'Noto Serif KR',serif;
  }
  .month-dropdown{
    position:absolute; top:30px; left:0; background:#fff; border:1px solid var(--rule-strong);
    border-radius:10px; box-shadow:var(--shadow); z-index:25; display:none; min-width:96px; overflow:hidden;
  }
  .month-dropdown.open{ display:block; }
  .month-opt{ padding:9px 18px; font-size:13.5px; cursor:pointer; color:var(--ink); }
  .month-opt:active, .month-opt.active{ background:var(--paper); font-weight:600; color:var(--seal); }

  .search-bar{ display:flex; gap:6px; margin-bottom:10px; }
  .search-bar input[type=text]{ flex:1; }
  .mini-btn{
    flex:none; padding:0 14px; border:1px solid var(--rule-strong); border-radius:10px;
    background:var(--paper-raised); color:var(--ink); font-size:13px; cursor:pointer; font-family:inherit;
  }
  input.mini-date{
    flex:none; width:120px; padding:9px 6px; font-size:11.5px;
  }

  .filter-bar{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--seal-soft); border:1px solid var(--seal); color:var(--seal);
    border-radius:8px; padding:7px 11px; font-size:12px; margin-bottom:10px;
  }
  .filter-bar button{ background:none; border:none; color:var(--seal); text-decoration:underline; font-size:12px; cursor:pointer; font-family:inherit; }

  .load-more{
    display:block; margin: 6px auto 20px; padding:9px 20px; border-radius:999px;
    border:1px solid var(--rule-strong); background:transparent; color:var(--ink-soft); font-size:12.5px; cursor:pointer;
  }

  /* ===== Modal ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(43,42,38,.42); z-index:100;
    display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.open{ display:flex; }
  .sheet{
    width:100%; max-width:640px; background:var(--paper-raised);
    border-radius:18px 18px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    max-height: 88vh; overflow-y:auto;
    animation: rise .22s ease-out;
  }
  @keyframes rise{ from{ transform:translateY(24px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .overlay.center-modal{ align-items:center; padding:20px; }
  .overlay.center-modal .sheet{
    border-radius:16px; max-height:82vh; animation: pop .18s ease-out;
  }
  @keyframes pop{ from{ transform:scale(.94); opacity:0;} to{ transform:scale(1); opacity:1;} }
  .sheet h3{ font-family:'Noto Serif KR',serif; font-size:16px; margin:0 0 14px; display:flex; justify-content:space-between; align-items:center;}
  .sheet h3 .x{ font-size:13px; color:var(--ink-soft); font-weight:400; cursor:pointer; }
  .sheet .row-btns{ display:flex; gap:8px; margin-top:14px; }
  .sheet .row-btns button{ flex:1; padding:11px; border-radius:10px; font-size:14px; cursor:pointer; font-family:inherit; border:1px solid var(--rule-strong); background:transparent; color:var(--ink);}
  .sheet .row-btns button.primary{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .sheet .row-btns button.danger{ color:var(--seal); border-color:var(--seal); background:var(--seal-soft);}

  /* report */
  .report-capture{
    background:#fff; border:1px solid var(--rule); border-radius:12px; padding:16px;
  }
  .report-capture-title{
    font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px; margin-bottom:10px;
    padding-bottom:9px; border-bottom:1px solid var(--rule-strong); color:var(--ink);
  }
  .rc-row{ display:flex; align-items:stretch; border-bottom:1px dashed var(--rule); font-size:12.5px; }
  .rc-row:last-child{ border-bottom:none; }
  .rc-row .rc-cat{ flex:none; width:66px; font-weight:600; color:var(--ink-soft); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-right:1.5px solid var(--rule-strong); padding:7px 6px; display:flex; align-items:center; }
  .rc-row .rc-content{ flex:1; min-width:0; color:var(--ink); white-space:pre-wrap; word-break:break-word; overflow-wrap:anywhere; border-right:1.5px solid var(--rule-strong); padding:7px 8px; display:flex; align-items:center; }
  .rc-row .rc-note-col{ flex:none; width:60px; padding:7px 4px; display:flex; align-items:center; justify-content:center; }
  .rc-row .rc-note{ font-size:10px; padding:2px 7px; border-radius:999px; font-weight:600; text-align:center; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rc-empty{ text-align:center; color:var(--ink-soft); font-size:12.5px; padding:20px 0; }
  .copied-toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; font-size:13px; padding:10px 18px; border-radius:999px;
    z-index:200; box-shadow:var(--shadow); display:none;
  }
  .copied-toast.show{ display:block; animation: fadeUp .25s ease-out; }
  @keyframes fadeUp{ from{opacity:0; transform:translate(-50%,6px);} to{opacity:1; transform:translate(-50%,0);} }

  /* ===== Login ===== */
  .login-screen{
    position:fixed; inset:0; z-index:300; background:var(--paper);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-box{ width:100%; max-width:340px; }
  .login-box .brand-mark{ margin:0 auto 14px; }
  .login-box h2{ font-family:'Noto Serif KR',serif; text-align:center; font-size:19px; margin:0 0 4px; }
  .login-box .sub{ text-align:center; font-size:12px; color:var(--ink-soft); margin-bottom:22px; }
  .login-box .field{ margin-bottom:10px; }
  .login-box .add-btn{ margin-top:6px; }
  .login-err{ font-size:12px; color:var(--seal); text-align:center; margin-top:8px; min-height:16px; }

  /* ===== Tabs / user bar ===== */
  .user-bar{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--ink-soft); }
  .user-bar .role-tag{ font-size:9.5px; padding:1px 6px; border-radius:999px; border:1px solid var(--rule-strong); }
  .user-bar .role-tag.admin{ color:var(--seal); border-color:var(--seal); background:var(--seal-soft); }
  .user-bar .logout{ color:var(--ink-soft); text-decoration:underline; cursor:pointer; background:none; border:none; font-size:11px; font-family:inherit; padding:0; }
  .tab-bar{ display:flex; gap:18px; margin-top:10px; }
  .tab-btn{ font-size:13px; color:var(--ink-soft); padding:0 0 8px; border:none; background:none; cursor:pointer; font-family:inherit; border-bottom:2px solid transparent; }
  .tab-btn.active{ color:var(--ink); font-weight:600; border-color:var(--seal); }

  /* ===== Settings ===== */
  .settings-card{ background:var(--paper-raised); border:1px solid var(--rule); border-radius:14px; box-shadow:var(--shadow); padding:14px; margin-bottom:16px; }
  .settings-card h4{ font-family:'Noto Serif KR',serif; font-size:14px; margin:0 0 12px; }
  .acct-row{ display:flex; align-items:center; gap:8px; padding:9px 2px; border-bottom:1px dashed var(--rule); font-size:13px; }
  .acct-row:last-child{ border-bottom:none; }
  .acct-row .id{ font-weight:600; }
  .acct-row .del{ margin-left:auto; }
  .add-acct-form{ display:flex; flex-direction:column; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--rule); }
  .role-toggle{ display:flex; gap:6px; }
  .role-toggle .chip{ flex:1; text-align:center; }
  .log-row{ font-size:11.5px; color:var(--ink-soft); padding:6px 2px; border-bottom:1px dashed var(--rule); line-height:1.5; }
  .log-row:last-child{ border-bottom:none; }
  .log-row .who{ color:var(--ink); font-weight:600; }
  .del-btn{ margin-left:auto; font-size:11px; color:var(--seal); background:var(--seal-soft); border:1px solid var(--seal); border-radius:8px; padding:4px 10px; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen" style="display:none;">
  <div class="login-box">
    <div class="brand-mark">日</div>
    <h2>업무일지</h2>
    <div class="sub">아이디와 비밀번호를 입력해주세요</div>
    <div class="field"><input type="text" id="loginId" placeholder="아이디" autocapitalize="off" autocomplete="username"></div>
    <div class="field"><input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password"></div>
    <button class="add-btn" id="loginBtn">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="appRoot" style="display:none;">

<header class="app-header">
  <div class="header-row">
    <div class="brand">
      <div class="brand-mark">日</div>
      <h1>업무일지</h1>
    </div>
    <div class="user-bar">
      <span id="userIdLabel"></span>
      <span class="role-tag" id="userRoleLabel"></span>
      <span class="sync-dot off" id="syncDot"><i></i><span id="syncText">연결중</span></span>
      <button class="logout" id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="header-sub">쓰기 편하게 기록하고, 한 번에 보고하세요</div>
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" id="tabBtnWorklog">업무일지</button>
    <button class="tab-btn" id="tabBtnSettings" style="display:none;">설정</button>
  </div>
</header>

<main>
<div id="tabWorklog">
  <div class="add-card">
    <div class="checkin-bar" id="checkinBar" style="display:none;">
      <span>☀️ 오늘 첫 업무일지네요 — 리뷰현황·은행거래내역·메일 확인을 자동으로 추가할까요?</span>
      <button id="checkinBtn">출근 · 반복업무 추가</button>
    </div>
    <div class="date-nav">
      <button class="arrow" id="prevDay">‹</button>
      <div class="date-label">
        <div><span class="d serif" id="labelDate">–</span><span class="w" id="labelWeekday"></span></div>
        <input type="date" id="datePicker">
      </div>
      <button class="arrow" id="nextDay">›</button>
    </div>

    <label class="field-label">구분</label>
    <div class="field">
      <input type="text" id="catInput" list="catList">
      <datalist id="catList"></datalist>
    </div>
    <div class="chip-row" id="catChips"></div>

    <label class="field-label">내용</label>
    <div class="field">
      <textarea id="contentInput"></textarea>
    </div>

    <label class="field-label">비고</label>
    <div class="status-row" id="statusRow">
      <div class="status-chip" data-v="완료">완료</div>
      <div class="status-chip" data-v="진행중">진행중</div>
      <div class="status-chip" data-v="대기중">대기중</div>
    </div>
    <div class="field">
      <input type="text" id="noteInput">
    </div>

    <button class="add-btn" id="addBtn">+ 업무일지에 추가</button>
  </div>

  <div class="month-select-wrap">
    <button class="month-select-btn" id="monthSelectBtn">7월 ▾</button>
    <div class="month-dropdown" id="monthDropdown"></div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput">
    <button class="mini-btn" id="searchBtn">검색</button>
    <input type="date" id="dateJumpPicker" class="mini-date">
  </div>

  <div class="filter-bar" id="filterBar" style="display:none;">
    <span id="filterLabel"></span>
    <button id="filterClear">전체보기</button>
  </div>

  <div class="toolbar">
    <span class="count" id="entryCount"></span>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
/* ============ Firebase ============ */
const firebaseConfig = {
  apiKey: "AIzaSyCIvN2Y1a9ByNmz4UpgdmaTFrd5SAYZZGY",
  authDomain: "trip-84bd3.firebaseapp.com",
  projectId: "trip-84bd3",
  storageBucket: "trip-84bd3.firebasestorage.app",
  messagingSenderId: "830387988854",
  appId: "1:830387988854:web:71dec7e602b6d2d814b257"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ENTRIES = db.collection('workLogApp_entries');
const META = db.collection('workLogApp_meta').doc('categories');
const ACCOUNTS = db.collection('workLogApp_accounts');
const LOGS = db.collection('workLogApp_logs');

const syncDot = document.getElementById('syncDot');
const syncText = document.getElementById('syncText');
db.collection('workLogApp_meta').doc('ping').set({t: Date.now()}, {merge:true})
  .then(()=>{ syncDot.classList.remove('off'); syncText.textContent = '동기화됨'; })
  .catch(()=>{ syncText.textContent = '연결 실패'; });

/* ============ State ============ */
const WEEKDAYS = ['일','월','화','수','목','금','토'];
const DEFAULT_CATS = ['은행거래내역','주문&리뷰','리뷰현황','메일','세금계산서','급여','매출확정','매입현황','거래명세서','4대보험','월결제','자금일보','법인카드','급여신고'];
let categories = [...DEFAULT_CATS];
let selectedDate = todayStr();
let selectedStatus = '';
let allEntries = []; // live from Firestore, sorted date desc
let editingId = null;

let listMode = 'month'; // 'month' | 'search' | 'date'
let currentMonth = todayStr().slice(0,7); // 'YYYY-MM'
let searchQuery = '';
let filterDate = '';

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDate(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtLabel(s){
  const d = parseDate(s);
  return { day: d.getDate(), month: d.getMonth()+1, year: d.getFullYear(), wd: WEEKDAYS[d.getDay()] };
}
function shiftDate(s, delta){
  const d = parseDate(s);
  d.setDate(d.getDate()+delta);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/* ============ Date nav ============ */
const datePicker = document.getElementById('datePicker');
function renderDateLabel(){
  const {day, wd} = fmtLabel(selectedDate);
  document.getElementById('labelDate').textContent = day + '일';
  document.getElementById('labelWeekday').textContent = '('+wd+')' + (selectedDate===todayStr() ? ' · 오늘' : '');
  datePicker.value = selectedDate;
  updateCheckinBar();
}
document.getElementById('prevDay').onclick = ()=>{ selectedDate = shiftDate(selectedDate,-1); renderDateLabel(); };
document.getElementById('nextDay').onclick = ()=>{ selectedDate = shiftDate(selectedDate,1); renderDateLabel(); };
datePicker.onchange = ()=>{ selectedDate = datePicker.value; renderDateLabel(); };

/* ============ Check-in (recurring daily tasks) ============ */
const RECURRING_TASKS = ['리뷰현황','은행거래내역','메일'];
function updateCheckinBar(){
  const bar = document.getElementById('checkinBar');
  if(!bar) return;
  if(selectedDate !== todayStr()){ bar.style.display = 'none'; return; }
  const todays = allEntries.filter(e=>e.date===selectedDate);
  const hasAll = RECURRING_TASKS.every(cat => todays.some(e=>e.category===cat));
  bar.style.display = hasAll ? 'none' : 'flex';
}
document.getElementById('checkinBtn').onclick = async ()=>{
  const btn = document.getElementById('checkinBtn');
  btn.disabled = true; btn.textContent = '추가 중…';
  try{
    const yesterday = shiftDate(selectedDate, -1);
    const {month: ym, day: yd} = fmtLabel(yesterday);
    const mmdd = `${String(ym).padStart(2,'0')}/${String(yd).padStart(2,'0')}`;
    const base = Date.now();
    const items = [
      { category:'리뷰현황', content:`~${mmdd} 리뷰현황 확인`, note:'완료' },
      { category:'은행거래내역', content:`~${mmdd}`, note:'완료' },
      { category:'메일', content:'네이버, 다음계정 메일 확인', note:'완료' }
    ];
    const batch = db.batch();
    items.forEach((it, idx)=>{
      const ref = ENTRIES.doc();
      batch.set(ref, {
        date: selectedDate,
        category: it.category,
        content: it.content,
        note: it.note,
        seq: base + idx,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    logAction('출근 반복업무 추가', selectedDate);
  }catch(err){
    alert('추가에 실패했습니다: ' + err.message);
  }finally{
    btn.disabled = false; btn.textContent = '출근 · 반복업무 추가';
  }
};
renderDateLabel();

/* ============ Categories ============ */
function renderCatChips(){
  const top = categories.slice(0,8);
  const wrap = document.getElementById('catChips');
  wrap.innerHTML = top.map(c=>`<div class="chip" data-c="${escapeAttr(c)}">${escapeHtml(c)}</div>`).join('');
  document.getElementById('catList').innerHTML = categories.map(c=>`<option value="${escapeAttr(c)}">`).join('');
}
document.getElementById('catChips').addEventListener('click', (e)=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.getElementById('catInput').value = chip.dataset.c;
  [...document.querySelectorAll('#catChips .chip')].forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
});
META.onSnapshot(doc=>{
  const data = doc.data();
  if(data && Array.isArray(data.list) && data.list.length){
    const merged = [...new Set([...data.list, ...DEFAULT_CATS])];
    categories = merged;
  }
  renderCatChips();
}, ()=>{ renderCatChips(); });

function rememberCategory(cat){
  if(!cat) return;
  categories = [cat, ...categories.filter(c=>c!==cat)];
  META.set({ list: categories.slice(0,40) }, {merge:true}).catch(()=>{});
}

/* ============ Status chips (add-card) ============ */
document.getElementById('statusRow').addEventListener('click', (e)=>{
  const chip = e.target.closest('.status-chip');
  if(!chip) return;
  const v = chip.dataset.v;
  if(selectedStatus === v){ selectedStatus = ''; }
  else { selectedStatus = v; }
  document.getElementById('noteInput').value = selectedStatus;
  syncStatusChips();
});
document.getElementById('noteInput').addEventListener('input', (e)=>{
  const v = e.target.value.trim();
  selectedStatus = (v==='완료'||v==='진행중'||v==='대기중') ? v : '';
  syncStatusChips();
});
function syncStatusChips(){
  [...document.querySelectorAll('#statusRow .status-chip')].forEach(c=>{
    c.classList.remove('sel-done','sel-progress','sel-wait');
    if(c.dataset.v === selectedStatus){
      c.classList.add(selectedStatus==='완료'?'sel-done':selectedStatus==='진행중'?'sel-progress':'sel-wait');
    }
  });
}

/* ============ Status chips (edit modal) ============ */
let editSelectedStatus = '';
document.getElementById('editStatusRow').addEventListener('click', (e)=>{
  const chip = e.target.closest('.status-chip');
  if(!chip) return;
  const v = chip.dataset.v;
  editSelectedStatus = (editSelectedStatus === v) ? '' : v;
  document.getElementById('editNote').value = editSelectedStatus;
  syncEditStatusChips();
});
document.getElementById('editNote').addEventListener('input', (e)=>{
  const v = e.target.value.trim();
  editSelectedStatus = (v==='완료'||v==='진행중'||v==='대기중') ? v : '';
  syncEditStatusChips();
});
function syncEditStatusChips(){
  [...document.querySelectorAll('#editStatusRow .status-chip')].forEach(c=>{
    c.classList.remove('sel-done','sel-progress','sel-wait');
    if(c.dataset.v === editSelectedStatus){
      c.classList.add(editSelectedStatus==='완료'?'sel-done':editSelectedStatus==='진행중'?'sel-progress':'sel-wait');
    }
  });
}

/* ============ Add entry ============ */
document.getElementById('addBtn').onclick = async ()=>{
  const cat = document.getElementById('catInput').value.trim();
  const content = document.getElementById('contentInput').value.trim();
  const note = document.getElementById('noteInput').value.trim();
  if(!cat || !content){
    alert('구분과 내용을 입력해주세요.');
    return;
  }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = '추가 중…';
  try{
    await ENTRIES.add({
      date: selectedDate,
      category: cat,
      content: content,
      note: note,
      seq: Date.now(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    logAction('업무일지 추가', `${selectedDate} ${cat}`);
    rememberCategory(cat);
    document.getElementById('catInput').value = '';
    document.getElementById('contentInput').value = '';
    document.getElementById('noteInput').value = '';
    selectedStatus = '';
    syncStatusChips();
    [...document.querySelectorAll('#catChips .chip')].forEach(c=>c.classList.remove('active'));
    document.getElementById('contentInput').focus();
  }catch(err){
    alert('저장에 실패했습니다: ' + err.message);
  }finally{
    btn.disabled = false; btn.textContent = '+ 업무일지에 추가';
  }
};

/* ============ Live list ============ */
ENTRIES.orderBy('date','desc').onSnapshot(snap=>{
  allEntries = snap.docs.map(d=>({id:d.id, ...d.data()}));
  renderList();
  updateCheckinBar();
}, err=>{
  document.getElementById('listWrap').innerHTML = `<div class="empty-state"><p>불러오기에 실패했습니다.</p><p style="font-size:11px;">${escapeHtml(err.message)}</p></div>`;
});

function sortEntries(list){
  return list.slice().sort((a,b)=> (a.seq||0) - (b.seq||0));
}
function noteClass(note){
  return note==='완료' ? 'done' : note==='진행중' ? 'progress' : note==='대기중' ? 'wait' : '';
}

function availableMonths(){
  const set = new Set(allEntries.map(e=>e.date.slice(0,7)));
  set.add(currentMonth);
  set.add(todayStr().slice(0,7));
  return [...set].sort((a,b)=> a<b?1:-1);
}
function updateMonthBtnLabel(){
  const mm = parseInt(currentMonth.slice(5,7), 10);
  document.getElementById('monthSelectBtn').textContent = mm + '월 ▾';
}
function renderMonthDropdown(){
  const wrap = document.getElementById('monthDropdown');
  wrap.innerHTML = availableMonths().map(m=>{
    const mm = parseInt(m.slice(5,7), 10);
    return `<div class="month-opt ${m===currentMonth?'active':''}" data-m="${m}">${mm}월</div>`;
  }).join('');
}
document.getElementById('monthSelectBtn').onclick = (e)=>{
  e.stopPropagation();
  renderMonthDropdown();
  document.getElementById('monthDropdown').classList.toggle('open');
};
document.getElementById('monthDropdown').addEventListener('click', (e)=>{
  const opt = e.target.closest('.month-opt');
  if(!opt) return;
  currentMonth = opt.dataset.m;
  listMode = 'month';
  searchQuery = ''; filterDate = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('dateJumpPicker').value = '';
  document.getElementById('monthDropdown').classList.remove('open');
  updateMonthBtnLabel();
  renderList();
});
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.month-select-wrap')){
    document.getElementById('monthDropdown').classList.remove('open');
  }
});

function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  searchQuery = q;
  listMode = 'search';
  filterDate = '';
  document.getElementById('dateJumpPicker').value = '';
  renderList();
}
document.getElementById('searchBtn').onclick = doSearch;
document.getElementById('searchInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') doSearch(); });

document.getElementById('dateJumpPicker').addEventListener('change', (e)=>{
  const v = e.target.value;
  if(!v) return;
  filterDate = v;
  listMode = 'date';
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderList();
});

document.getElementById('filterClear').onclick = ()=>{
  listMode = 'month';
  searchQuery = ''; filterDate = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('dateJumpPicker').value = '';
  renderList();
};

function renderList(){
  let scoped;
  let filterLabel = '';
  if(listMode === 'search'){
    const q = searchQuery.toLowerCase();
    scoped = allEntries.filter(e =>
      (e.category||'').toLowerCase().includes(q) ||
      (e.content||'').toLowerCase().includes(q) ||
      (e.note||'').toLowerCase().includes(q)
    );
    filterLabel = `'${searchQuery}' 검색결과`;
  } else if(listMode === 'date'){
    scoped = allEntries.filter(e => e.date === filterDate);
    const {day, wd, month} = fmtLabel(filterDate);
    filterLabel = `${month}월 ${day}일(${wd}) 기록`;
  } else {
    scoped = allEntries.filter(e => e.date.slice(0,7) === currentMonth);
  }

  document.getElementById('filterBar').style.display = listMode === 'month' ? 'none' : 'flex';
  document.getElementById('filterLabel').textContent = filterLabel;

  const byDate = {};
  scoped.forEach(e=>{ (byDate[e.date] = byDate[e.date] || []).push(e); });
  const dates = Object.keys(byDate).sort((a,b)=> a<b?1:-1);

  document.getElementById('entryCount').textContent = scoped.length ? `총 ${scoped.length}건 · ${dates.length}일` : '';

  if(!dates.length){
    const msg = listMode === 'month' ? '이 달에 기록된 업무일지가 없습니다.' : '조건에 맞는 업무일지가 없습니다.';
    document.getElementById('listWrap').innerHTML = `<div class="empty-state"><div class="mark serif">記</div><p>${msg}</p></div>`;
    return;
  }

  document.getElementById('listWrap').innerHTML = dates.map(dateStr=>{
    const {day, wd, month} = fmtLabel(dateStr);
    const entries = sortEntries(byDate[dateStr]);
    const rows = entries.map(e=>{
      const note = e.note || '';
      const cls = noteClass(note);
      return `
        <div class="entry" data-id="${e.id}">
          <span class="drag-handle" draggable="true" title="드래그해서 순서 변경">⠿</span>
          <span class="cat">${escapeHtml(e.category)}</span>
          <span class="content-line">${escapeHtml(e.content)}</span>
          <span class="note-col">${note ? `<span class="note-tag ${cls}">${escapeHtml(note)}</span>` : ''}</span>
        </div>`;
    }).join('');
    return `
      <div class="day-group">
        <div class="day-head">
          <span class="num serif">${day}</span>
          <span class="wd">${wd}요일</span>
          <span class="ym">${month}월</span>
        </div>
        <div class="day-entries" data-date="${dateStr}">
          ${rows}
        </div>
      </div>`;
  }).join('');
}
updateMonthBtnLabel();

document.getElementById('listWrap').addEventListener('click', (e)=>{
  if(e.target.closest('.drag-handle')) return;
  const row = e.target.closest('.entry');
  if(!row) return;
  openEdit(row.dataset.id);
});

/* ============ Drag to reorder (mouse) ============ */
let dragSrcId = null;
let dragSrcDate = null;

document.getElementById('listWrap').addEventListener('dragstart', (e)=>{
  const handle = e.target.closest('.drag-handle');
  if(!handle || listMode !== 'month'){ e.preventDefault(); return; }
  const row = handle.closest('.entry');
  const container = row.closest('.day-entries');
  dragSrcId = row.dataset.id;
  dragSrcDate = container ? container.dataset.date : null;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcId);
  row.classList.add('dragging');
});
document.getElementById('listWrap').addEventListener('dragend', (e)=>{
  const row = e.target.closest('.entry');
  if(row) row.classList.remove('dragging');
  if(dragSrcDate) persistOrder(dragSrcDate);
  dragSrcId = null; dragSrcDate = null;
});
document.getElementById('listWrap').addEventListener('dragover', (e)=>{
  if(!dragSrcId) return;
  const row = e.target.closest('.entry');
  if(!row || row.dataset.id === dragSrcId) return;
  const container = row.closest('.day-entries');
  if(!container || container.dataset.date !== dragSrcDate) return;
  e.preventDefault();
  const dragEl = container.querySelector(`.entry[data-id="${dragSrcId}"]`);
  if(!dragEl) return;
  const rect = row.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height/2;
  if(before) container.insertBefore(dragEl, row);
  else container.insertBefore(dragEl, row.nextSibling);
});
document.getElementById('listWrap').addEventListener('drop', (e)=>{ e.preventDefault(); });

async function persistOrder(dateStr){
  const container = document.querySelector(`.day-entries[data-date="${dateStr}"]`);
  if(!container) return;
  const rows = [...container.querySelectorAll('.entry')];
  const base = Date.now() - rows.length;
  const batch = db.batch();
  rows.forEach((row, idx)=>{
    const id = row.dataset.id;
    const newSeq = base + idx;
    const entry = allEntries.find(x=>x.id===id);
    if(entry) entry.seq = newSeq;
    batch.update(ENTRIES.doc(id), { seq: newSeq });
  });
  try{
    await batch.commit();
    logAction('업무일지 순서 변경', dateStr);
  }catch(err){ console.error('순서 저장 실패', err); }
}

/* ============ Edit modal ============ */
function openEdit(id){
  const e = allEntries.find(x=>x.id===id);
  if(!e) return;
  editingId = id;
  document.getElementById('editCat').value = e.category;
  document.getElementById('editContent').value = e.content;
  const note = e.note || '';
  document.getElementById('editNote').value = note;
  editSelectedStatus = (note==='완료'||note==='진행중'||note==='대기중') ? note : '';
  syncEditStatusChips();
  document.getElementById('editOverlay').classList.add('open');
}
document.getElementById('editClose').onclick = ()=>{ document.getElementById('editOverlay').classList.remove('open'); };
document.getElementById('editOverlay').addEventListener('click', (e)=>{ if(e.target.id==='editOverlay') e.currentTarget.classList.remove('open'); });

document.getElementById('editSave').onclick = async ()=>{
  if(!editingId) return;
  const cat = document.getElementById('editCat').value.trim();
  const content = document.getElementById('editContent').value.trim();
  const note = document.getElementById('editNote').value.trim();
  if(!cat || !content){ alert('구분과 내용을 입력해주세요.'); return; }
  try{
    await ENTRIES.doc(editingId).update({ category: cat, content, note });
    logAction('업무일지 수정', cat);
    rememberCategory(cat);
    document.getElementById('editOverlay').classList.remove('open');
  }catch(err){ alert('저장 실패: ' + err.message); }
};
document.getElementById('editDelete').onclick = async ()=>{
  if(!editingId) return;
  if(!confirm('이 업무일지를 삭제할까요?')) return;
  const e = allEntries.find(x=>x.id===editingId);
  try{
    await ENTRIES.doc(editingId).delete();
    logAction('업무일지 삭제', e ? `${e.date} ${e.category}` : editingId);
    document.getElementById('editOverlay').classList.remove('open');
  }catch(err){ alert('삭제 실패: ' + err.message); }
};

/* ============ Report ============ */
let reportDate = todayStr();
document.getElementById('reportBtn').onclick = ()=>{
  reportDate = todayStr();
  document.getElementById('reportDatePicker').value = reportDate;
  buildReport();
  document.getElementById('reportOverlay').classList.add('open');
};
document.getElementById('reportDatePicker').onchange = (e)=>{ reportDate = e.target.value; buildReport(); };
document.getElementById('reportClose').onclick = ()=>{ document.getElementById('reportOverlay').classList.remove('open'); };
document.getElementById('reportOverlay').addEventListener('click', (e)=>{ if(e.target.id==='reportOverlay') e.currentTarget.classList.remove('open'); });

function buildReport(){
  const {day, wd, month, year} = fmtLabel(reportDate);
  document.getElementById('reportTitleText').textContent = `${month}월 ${day}일 업무 보고`;
  document.getElementById('reportCaptureTitle').textContent = `${year}년 ${month}월 ${day}일 (${wd}) 업무일지`;
  const entries = allEntries.filter(e=>e.date===reportDate).slice().sort((a,b)=>(a.seq||0)-(b.seq||0));
  const bodyEl = document.getElementById('reportCaptureBody');
  if(!entries.length){
    bodyEl.innerHTML = `<div class="rc-empty">기록된 업무가 없습니다.</div>`;
  } else {
    bodyEl.innerHTML = entries.map(e=>{
      const note = e.note || '';
      return `
        <div class="rc-row">
          <span class="rc-cat">${escapeHtml(e.category)}</span>
          <span class="rc-content">${escapeHtml(e.content)}</span>
          <span class="rc-note-col">${note ? `<span class="rc-note note-tag ${noteClass(note)}">${escapeHtml(note)}</span>` : ''}</span>
        </div>`;
    }).join('');
  }
}

function showToast(msg){
  const toast = document.getElementById('copiedToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1800);
}

document.getElementById('reportTextCopy').onclick = async ()=>{
  const {day, wd, month, year} = fmtLabel(reportDate);
  const entries = allEntries.filter(e=>e.date===reportDate).slice().sort((a,b)=>(a.seq||0)-(b.seq||0));
  let text = `${year}년 ${month}월 ${day}일 (${wd}) 업무일지\n\n`;
  if(!entries.length){
    text += '(기록된 업무가 없습니다)';
  } else {
    entries.forEach((e,i)=>{
      const noteTag = e.note ? ` [${e.note}]` : '';
      text += `${i+1}. ${e.category} — ${e.content}${noteTag}\n`;
    });
  }
  try{
    await navigator.clipboard.writeText(text);
  }catch(err){
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  showToast('텍스트가 복사되었습니다 ✓');
};

document.getElementById('reportImgCopy').onclick = async ()=>{
  const btn = document.getElementById('reportImgCopy');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '이미지 생성 중…';
  const target = document.getElementById('reportCapture');
  try{
    if(navigator.clipboard && window.ClipboardItem){
      const item = new ClipboardItem({
        'image/png': new Promise((resolve, reject)=>{
          html2canvas(target, {backgroundColor:'#FFFFFF', scale:2})
            .then(canvas => canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('빈 이미지'))))
            .catch(reject);
        })
      });
      await navigator.clipboard.write([item]);
      showToast('이미지가 복사되었습니다 ✓');
    } else {
      throw new Error('clipboard image write unsupported');
    }
  }catch(err){
    try{
      const canvas = await html2canvas(target, {backgroundColor:'#FFFFFF', scale:2});
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url; a.download = `업무일지_${reportDate}.png`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast('이미지로 저장했습니다 (공유해주세요)');
    }catch(err2){
      alert('이미지 생성에 실패했습니다: ' + err2.message);
    }
  }finally{
    btn.disabled = false; btn.textContent = orig;
  }
};

/* ============ Utils ============ */
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

renderCatChips();

/* ============ Auth ============ */
let currentUser = null; // {id, role}
const SESSION_KEY = 'workLogApp_session';

function logAction(action, detail){
  if(!currentUser) return;
  LOGS.add({
    user: currentUser.id,
    role: currentUser.role,
    action: action,
    detail: detail || '',
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
}

async function ensureDefaultAdmin(){
  try{
    const snap = await ACCOUNTS.limit(1).get();
    if(snap.empty){
      await ACCOUNTS.doc('admin').set({ id:'admin', password:'1234', role:'admin' });
    }
  }catch(e){ /* offline: login screen will just show a connection error on attempt */ }
}

function loadSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveSession(u){ localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

async function tryAutoLogin(){
  const sess = loadSession();
  if(!sess){ showLogin(); return; }
  try{
    const doc = await ACCOUNTS.doc(sess.id).get();
    if(doc.exists){
      currentUser = { id: sess.id, role: doc.data().role };
      enterApp();
    } else {
      clearSession(); showLogin();
    }
  }catch(e){ showLogin(); }
}

function showLogin(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appRoot').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginErr').textContent = '';
}
function enterApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('userIdLabel').textContent = currentUser.id;
  const roleLabel = document.getElementById('userRoleLabel');
  roleLabel.textContent = currentUser.role === 'admin' ? '관리자' : '일반';
  roleLabel.classList.toggle('admin', currentUser.role==='admin');
  document.getElementById('tabBtnSettings').style.display = currentUser.role==='admin' ? 'inline-block' : 'none';
  switchTab('worklog');
}

document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('loginPw').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('loginId').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if(!id || !pw){ errEl.textContent = '아이디와 비밀번호를 입력해주세요.'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '확인 중…';
  try{
    const doc = await ACCOUNTS.doc(id).get();
    if(!doc.exists || doc.data().password !== pw){
      errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
      return;
    }
    currentUser = { id, role: doc.data().role };
    saveSession(currentUser);
    enterApp();
    logAction('로그인');
  }catch(e){
    errEl.textContent = '로그인에 실패했습니다: ' + e.message;
  }finally{
    btn.disabled = false; btn.textContent = '로그인';
  }
}

document.getElementById('logoutBtn').onclick = ()=>{
  logAction('로그아웃');
  clearSession();
  currentUser = null;
  showLogin();
};

/* ============ Tabs ============ */
function switchTab(name){
  const isWorklog = name==='worklog';
  document.getElementById('tabWorklog').style.display = isWorklog ? '' : 'none';
  document.getElementById('tabSettings').style.display = isWorklog ? 'none' : '';
  document.getElementById('tabBtnWorklog').classList.toggle('active', isWorklog);
  document.getElementById('tabBtnSettings').classList.toggle('active', !isWorklog);
}
document.getElementById('tabBtnWorklog').onclick = ()=>switchTab('worklog');
document.getElementById('tabBtnSettings').onclick = ()=>{
  if(!currentUser || currentUser.role!=='admin') return;
  switchTab('settings');
};

/* ============ Accounts (settings, admin only) ============ */
let accountsCache = [];
ACCOUNTS.onSnapshot(snap=>{
  accountsCache = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  renderAccounts();
}, ()=>{});

function renderAccounts(){
  const wrap = document.getElementById('acctList');
  if(!accountsCache.length){ wrap.innerHTML = '<div class="acct-row">등록된 계정이 없습니다.</div>'; return; }
  const adminCount = accountsCache.filter(a=>a.role==='admin').length;
  wrap.innerHTML = accountsCache.map(a=>{
    const isLastAdmin = a.role==='admin' && adminCount<=1;
    return `<div class="acct-row">
      <span class="id">${escapeHtml(a.id)}</span>
      <span class="role-tag ${a.role==='admin'?'admin':''}">${a.role==='admin'?'관리자':'일반'}</span>
      ${isLastAdmin ? '' : `<button class="del-btn" data-id="${escapeAttr(a.id)}">삭제</button>`}
    </div>`;
  }).join('');
}
document.getElementById('acctList').addEventListener('click', async (e)=>{
  const btn = e.target.closest('.del-btn');
  if(!btn) return;
  const id = btn.dataset.id;
  if(currentUser && id === currentUser.id){ alert('현재 로그인된 계정은 삭제할 수 없습니다.'); return; }
  if(!confirm(`'${id}' 계정을 삭제할까요?`)) return;
  try{
    await ACCOUNTS.doc(id).delete();
    logAction('계정 삭제', id);
  }catch(err){ alert('삭제 실패: ' + err.message); }
});

let newAcctRole = 'user';
document.getElementById('newAcctRole').addEventListener('click', (e)=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  newAcctRole = chip.dataset.r;
  [...document.querySelectorAll('#newAcctRole .chip')].forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
});
document.getElementById('addAcctBtn').onclick = async ()=>{
  const id = document.getElementById('newAcctId').value.trim();
  const pw = document.getElementById('newAcctPw').value;
  if(!id || !pw){ alert('아이디와 비밀번호를 입력해주세요.'); return; }
  try{
    const existing = await ACCOUNTS.doc(id).get();
    if(existing.exists){ alert('이미 존재하는 아이디입니다.'); return; }
    await ACCOUNTS.doc(id).set({ id, password: pw, role: newAcctRole });
    logAction('계정 추가', `${id} (${newAcctRole==='admin'?'관리자':'일반'})`);
    document.getElementById('newAcctId').value = '';
    document.getElementById('newAcctPw').value = '';
    newAcctRole = 'user';
    [...document.querySelectorAll('#newAcctRole .chip')].forEach(c=>c.classList.toggle('active', c.dataset.r==='user'));
  }catch(err){ alert('추가 실패: ' + err.message); }
};

/* ============ Logs (settings, admin only) ============ */
LOGS.orderBy('ts','desc').limit(60).onSnapshot(snap=>{
  const wrap = document.getElementById('logList');
  if(snap.empty){ wrap.innerHTML = '<div class="log-row">기록이 없습니다.</div>'; return; }
  wrap.innerHTML = snap.docs.map(d=>{
    const l = d.data();
    const t = l.ts && l.ts.toDate ? l.ts.toDate() : new Date();
    const tStr = `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    return `<div class="log-row"><span class="who">${escapeHtml(l.user||'')}</span> · ${tStr} · ${escapeHtml(l.action||'')}${l.detail?' — '+escapeHtml(l.detail):''}</div>`;
  }).join('');
}, ()=>{});

/* ============ Boot ============ */
ensureDefaultAdmin().finally(tryAutoLogin);
</script>
</body>
